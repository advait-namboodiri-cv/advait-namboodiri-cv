<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 150" width="900" height="150" role="img" aria-label="An F1 car racing across the screen">
  <style>
    .car {
      transform: translateX(-240px);
      animation: drive 6.5s linear 1s infinite;
      will-change: transform;
    }
    @keyframes drive {
      0%   { transform: translateX(-240px); }
      100% { transform: translateX(950px); }
    }
    .spin-rear, .spin-front {
      transform-box: fill-box;
      transform-origin: center;
      will-change: transform;
    }
    .spin-rear  { animation: spin 0.4s linear infinite; }
    .spin-front { animation: spin 0.35s linear infinite; }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .sl1 { animation: flick 0.35s linear infinite; }
    .sl2 { animation: flick 0.3s  linear infinite reverse; }
    .sl3 { animation: flick 0.42s linear infinite; }
    @keyframes flick {
      0%, 100% { opacity: 0.85; }
      50%      { opacity: 0.1; }
    }
  </style>
  <!-- track -->
  <rect x="0" y="116" width="900" height="14" rx="7" fill="#0B1B3F"/>
  <line x1="16" y1="123" x2="884" y2="123" stroke="#FFC906" stroke-width="2.5" stroke-dasharray="22 16" opacity="0.85"/>
  <!-- start/finish checkered strip -->
  <g>
    <rect x="842" y="116" width="7" height="7" fill="#E6EAF5"/>
    <rect x="849" y="116" width="7" height="7" fill="#11151C"/>
    <rect x="856" y="116" width="7" height="7" fill="#E6EAF5"/>
    <rect x="842" y="123" width="7" height="7" fill="#11151C"/>
    <rect x="849" y="123" width="7" height="7" fill="#E6EAF5"/>
    <rect x="856" y="123" width="7" height="7" fill="#11151C"/>
  </g>
  <!-- car -->
  <g class="car">
    <!-- speed lines -->
    <g stroke="#FFC906" stroke-width="3" stroke-linecap="round">
      <line class="sl1" x1="-48" y1="84" x2="-16" y2="84"/>
      <line class="sl2" x1="-62" y1="96" x2="-24" y2="96"/>
      <line class="sl3" x1="-44" y1="108" x2="-12" y2="108"/>
    </g>
    <!-- rear wing -->
    <rect x="0" y="72" width="22" height="5" rx="2" fill="#FFC906"/>
    <rect x="2" y="81" width="18" height="4" rx="2" fill="#FFC906"/>
    <rect x="8" y="74" width="5" height="26" fill="#1E41FF"/>
    <!-- engine cover hump -->
    <path d="M 18 98 Q 40 76 72 90 L 72 98 Z" fill="#1E41FF"/>
    <!-- floor + sidepod tapering to the nose -->
    <path d="M 18 96 L 112 96 L 152 102 L 186 107 Q 191 109.5 186 112 L 18 112 Z" fill="#1E41FF"/>
    <!-- nose tip -->
    <path d="M 166 104.5 L 186 107 Q 191 109.5 186 112 L 166 112 Z" fill="#E30118"/>
    <!-- front wing -->
    <rect x="174" y="112" width="24" height="3.5" rx="1.75" fill="#FFC906"/>
    <!-- halo -->
    <path d="M 76 92 Q 88 76 102 92" fill="none" stroke="#FFC906" stroke-width="3" stroke-linecap="round"/>
    <!-- helmet -->
    <circle cx="89" cy="88" r="6" fill="#E30118"/>
    <!-- initials on the sidepod -->
    <text x="118" y="108" font-family="Courier New, monospace" font-size="11" font-weight="bold" fill="#FFC906">AN</text>
    <!-- rear wheel -->
    <circle cx="40" cy="104" r="14" fill="#11151C" stroke="#FFC906" stroke-width="3"/>
    <g class="spin-rear" stroke="#FFC906" stroke-width="2" stroke-linecap="round">
      <line x1="40" y1="95" x2="40" y2="113"/>
      <line x1="31" y1="104" x2="49" y2="104"/>
    </g>
    <circle cx="40" cy="104" r="3" fill="#FFC906"/>
    <!-- front wheel -->
    <circle cx="140" cy="106" r="12" fill="#11151C" stroke="#FFC906" stroke-width="3"/>
    <g class="spin-front" stroke="#FFC906" stroke-width="2" stroke-linecap="round">
      <line x1="140" y1="98" x2="140" y2="114"/>
      <line x1="132" y1="106" x2="148" y2="106"/>
    </g>
    <circle cx="140" cy="106" r="2.5" fill="#FFC906"/>
  </g>
</svg>

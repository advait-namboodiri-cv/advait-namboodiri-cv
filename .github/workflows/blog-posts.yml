name: latest blog posts

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://advaitnamboo.com/rss.xml"
          max_post_count: 5
          template: "- 📝 [$title]($url) · $date $newline"
          date_format: "mmm d, yyyy"
          commit_message: "chore: update blog posts"
